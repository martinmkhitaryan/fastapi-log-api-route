name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v --cov=fastapi_log_api_route --cov-report=term-missing

  build-wheels:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/fastapi-log-api-route

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Hatch
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatch

      - name: Build universal wheel (py3-none-any)
        run: hatch build --target wheel

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: dist/*.whl
          retention-days: 1

  build-sdist:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/fastapi-log-api-route

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build source distribution
        run: python -m build --sdist

      - name: Upload source distribution as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/
          retention-days: 1

  upload-to-pypi:
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/fastapi-log-api-route

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Combine all packages
        run: |
          mkdir -p combined-packages
          cp artifacts/wheel/*.whl combined-packages/
          cp artifacts/sdist/* combined-packages/
          ls -la combined-packages/

      - name: Upload all packages to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: combined-packages/
          skip-existing: true
